services:
  - type: web
    name: deepfake-detector
    env: python
    repo: https://github.com/Naveen-star-1/Deepfake_detection
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
